spring:
  application:
    name: dating

  config:
    import: "optional:file:.env[.properties]"

  # PostgreSQL datasource
  datasource:
    url: ${SUPABASE_DB_JDBC_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Claude API Configuration
claude:
  api:
    key: ${CLAUDE_API_KEY:your-api-key-here}
    url: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-5-20250929
    max-tokens: 1024

# Supabase JWT secret for verifying tokens
supabase:
  url: ${SUPABASE_URL}
  jwt-secret: ${SUPABASE_JWT_SECRET}

# CORS Configuration (for React frontend)
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Logging
logging:
  level:
    root: INFO
    com.groupf.dating: DEBUG
